eve_json_path: /var/log/suricata/eve.json
# DLADS Agent Configuration
# ── IDS Mode ──────────────────────────────────────────────────────────────────
# ids_mode: "builtin"   → use the built-in rule engine (default, always works)
# ids_mode: "suricata"  → tail Suricata's eve.json and forward alerts
#                         Requires Suricata running with eve.json output enabled.
#                         Falls back gracefully if eve_json_path doesn't exist.


# ids_mode: builtin
# eve_json_path: /var/log/suricata/eve.json

ids_mode: suricata
eve_json_path: /var/log/suricata/eve.json

# ── Agent identity ─────────────────────────────────────────────────────────────
agent_host_id: localhost

# ── Publisher ──────────────────────────────────────────────────────────────────
publisher_endpoint: tcp://127.0.0.1:5555
publisher_queue_capacity: 1024
publisher_drop_warn_threshold_pct: 1

# ── SSH Brute Force (SSH_BRUTE_FORCE_001) ─────────────────────────────────────
# Fire after this many failed logins from one IP within window_seconds.
window_seconds: 60
threshold: 5
cooldown_seconds: 120

# ── Port Scan (PORT_SCAN_001) ──────────────────────────────────────────────────
scan_window_seconds: 30
scan_threshold: 15
scan_cooldown_seconds: 60

# ── Privilege Escalation (PRIV_ESC_001) ───────────────────────────────────────
priv_history_hours: 24
priv_cooldown_seconds: 300

# ── Multi-Service Auth Failure (MULTI_SERVICE_AUTH_001) ───────────────────────
multi_window_seconds: 300
multi_min_services: 2
multi_cooldown_seconds: 180
